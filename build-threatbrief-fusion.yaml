# Custom build config for threatbrief-fusion deployment
# Usage: gcloud builds submit --project=apm0008778-prd-eltetl-80 --config=build-threatbrief-fusion.yaml .

steps:
  # Build the container image with :latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'northamerica-northeast2-docker.pkg.dev/apm0008778-prd-eltetl-80/eventmill/threatbrief-fusion:latest'
      - '-f'
      - 'cloud_install/Dockerfile.cloudrun'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'northamerica-northeast2-docker.pkg.dev/apm0008778-prd-eltetl-80/eventmill/threatbrief-fusion:latest'

images:
  - 'northamerica-northeast2-docker.pkg.dev/apm0008778-prd-eltetl-80/eventmill/threatbrief-fusion:latest'

options:
  logging: CLOUD_LOGGING_ONLY
