# Event Mill v0.1.0 - Cloud Build CI/CD Pipeline
# Builds and deploys to Cloud Run with ttyd web terminal
#
# Usage:
#   gcloud builds submit --project="your-project-id" --config=cloud_install/cloudbuild.yaml .
#
# Or connect to GitHub repo for automatic builds on push.

steps:
  # Build the container image (commit-tagged + latest)
  # Uses Artifact Registry (gcr.io is deprecated)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/eventmill/event-mill:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/eventmill/event-mill:latest'
      - '-f'
      - 'cloud_install/Dockerfile.cloudrun'
      - '.'

  # Push commit-tagged image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/eventmill/event-mill:$COMMIT_SHA'

  # Push latest image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/eventmill/event-mill:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'event-mill'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/eventmill/event-mill:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--port'
      - '8080'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--no-cpu-throttling'
      - '--timeout'
      - '3600'
      - '--concurrency'
      - '5'
      - '--session-affinity'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--service-account'
      - 'eventmill-runner@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-secrets'
      - 'GEMINI_FLASH_API_KEY=eventmill-gemini-flash-api:latest,GEMINI_PRO_API_KEY=eventmill-gemini-pro-api:latest,TTYD_USERNAME=eventmill-ttyd-user:latest,TTYD_PASSWORD=eventmill-ttyd-cred:latest'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID,EVENTMILL_BUCKET_PREFIX=${_BUCKET_PREFIX},EVENTMILL_LOG_LEVEL=INFO'
      - '--allow-unauthenticated'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/eventmill/event-mill:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/eventmill/event-mill:latest'

substitutions:
  _REGION: northamerica-northeast2
  _BUCKET_PREFIX: ''   # set at submit time: --substitutions=_BUCKET_PREFIX=${GOOGLE_CLOUD_PROJECT}-eventmill

options:
  logging: CLOUD_LOGGING_ONLY
