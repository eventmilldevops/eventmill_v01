# Event Mill v0.1.0 - Local testing of Cloud Run image
# Simulates the Cloud Run environment locally via Docker Compose
#
# Usage:
#   docker compose -f cloud_install/docker-compose.cloudrun.yml up --build
#   Open http://localhost:8080 in browser

version: '3.8'

services:
  event-mill:
    build:
      context: ..
      dockerfile: cloud_install/Dockerfile.cloudrun
    container_name: eventmill-cloudrun-local
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # LLM keys — dual-tier model (Flash=light, Pro=heavy)
      - GEMINI_FLASH_API_KEY=${GEMINI_FLASH_API_KEY:-}
      - GEMINI_PRO_API_KEY=${GEMINI_PRO_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Storage — must match the GCS bucket prefix used during provisioning
      - EVENTMILL_BUCKET_PREFIX=${EVENTMILL_BUCKET_PREFIX:-eventmill}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      - GCS_LOG_BUCKET=${GCS_LOG_BUCKET:-}
      # GCS credentials — set GOOGLE_APPLICATION_CREDENTIALS on host or use ADC volume below
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - EVENTMILL_WORKSPACE=/app/workspace
      - EVENTMILL_LOG_LEVEL=${EVENTMILL_LOG_LEVEL:-DEBUG}
      - TTYD_USERNAME=${TTYD_USERNAME:-admin}
      - TTYD_PASSWORD=${TTYD_PASSWORD:-changeme}
    volumes:
      # Workspace persistence across restarts
      - ../workspace:/app/workspace
      # GCS credentials: choose ONE approach and uncomment:
      #
      # Option A — Application Default Credentials (run: gcloud auth application-default login)
      # - ${HOME}/.config/gcloud:/home/eventmill/.config/gcloud:ro
      #
      # Option B — Service account key file (set GOOGLE_APPLICATION_CREDENTIALS on host)
      # - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/app/credentials/sa-key.json:ro
    security_opt:
      - no-new-privileges:true
    stdin_open: true
    tty: true
    restart: unless-stopped
